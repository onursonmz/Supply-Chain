<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products — Supply Chain</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🔗 Supply Chain CorDapp</h1>
    <span class="node-badge" id="nodeName">Loading...</span>
</header>

<nav>
    <a href="index.html">Dashboard</a>
    <a href="products.html" class="active">Products</a>
    <a href="create-product.html">Create</a>
    <a href="transfer-product.html">Transfer</a>
</nav>

<main>
    <div class="card">
        <h2>Product List
            <button class="btn btn-primary" onclick="loadProducts()"
                    style="float:right; font-size:0.8rem; padding:6px 16px;">
                ↻ Refresh
            </button>
        </h2>

        <div id="message"></div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Product Name</th>
                        <th>Serial Number</th>
                        <th>Owner</th>
                        <th>Status</th>
                        <th>Linear ID</th>
                    </tr>
                </thead>
                <tbody id="productTable">
                    <tr><td colspan="5" class="loading">Loading products...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script>
    // Load node name
    fetch('/api/node-info')
        .then(r => r.json())
        .then(data => { document.getElementById('nodeName').textContent = data.nodeName; });

    function loadProducts() {
        const tbody = document.getElementById('productTable');
        tbody.innerHTML = '<tr><td colspan="5" class="loading">Loading...</td></tr>';

        fetch('/api/products')
            .then(r => r.json())
            .then(products => {
                if (products.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="loading">No products found in vault.</td></tr>';
                    return;
                }
                tbody.innerHTML = products.map(p => `
                    <tr>
                        <td><strong>${escHtml(p.productName)}</strong></td>
                        <td>${escHtml(p.serialNumber)}</td>
                        <td>${escHtml(p.owner)}</td>
                        <td><span class="badge ${p.status === 'CREATED' ? 'badge-created' : 'badge-transferred'}">
                            ${escHtml(p.status)}
                        </span></td>
                        <td class="id-cell">
                            ${escHtml(p.linearId.substring(0, 8))}...
                            <button class="copy-btn" onclick="copyId('${escHtml(p.linearId)}')">Copy ID</button>
                        </td>
                    </tr>
                `).join('');
            })
            .catch(err => {
                document.getElementById('message').innerHTML =
                    '<div class="alert alert-error">Failed to load products: ' + err.message + '</div>';
                tbody.innerHTML = '';
            });
    }

    function copyId(id) {
        navigator.clipboard.writeText(id).then(() => {
            const msg = document.getElementById('message');
            msg.innerHTML = '<div class="alert alert-info">Copied: ' + id + '</div>';
            setTimeout(() => { msg.innerHTML = ''; }, 3000);
        });
    }

    function escHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    // Load on page open
    loadProducts();
</script>

</body>
</html>
