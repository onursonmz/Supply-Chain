# ============================================================
# Supply Chain Web Application — Default Configuration
# Run with a profile: --spring.profiles.active=manufacturer
# ============================================================

# Corda RPC — override per profile
corda.host=localhost
corda.rpcPort=10006
corda.username=user1
corda.password=test

# Server
server.port=8080
spring.application.name=supply-chain-app

# Disable Spring Boot banner for cleaner output
spring.main.banner-mode=off

# Allow the app to serve static files from /static
spring.web.resources.static-locations=classpath:/static/
