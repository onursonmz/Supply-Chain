# ============================================================
# Supply Chain Web Application — Default Configuration
# Run with a profile: --spring.profiles.active=manufacturer
# ============================================================

# Corda RPC — override per profile
corda.host=localhost
corda.rpcPort=10006
corda.username=user1
corda.password=test

# Server
server.port=8080
spring.application.name=supply-chain-app

# Node role — MUST be overridden per profile (manufacturer / distributor / pharmacy)
app.node.role=manufacturer

# Disable Spring Boot banner for cleaner output
spring.main.banner-mode=off

# Allow the app to serve static files from /static
spring.web.resources.static-locations=classpath:/static/

# ── H2 File-Based Shared Database ──────────────────────────────────────────────
# AUTO_SERVER=TRUE allows multiple JVM instances (manufacturer/distributor/pharmacy)
# to connect to the same database file concurrently.
# The first instance to start creates the embedded TCP server on port 9091.
# Subsequent instances connect to it automatically.
spring.datasource.url=jdbc:h2:file:./supply-chain-db/supplychain;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE;AUTO_SERVER_PORT=9091
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# 'update' = create tables on first run, add missing columns on schema changes,
# and NEVER drop tables on shutdown — essential for the shared file database.
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

# Disable Liquibase — Corda's corda-node-api pulls an older Liquibase logger
# that is binary-incompatible with Spring Boot 2.7's liquibase-core-4.9.x.
# We use Hibernate DDL instead, so Liquibase is not needed.
spring.liquibase.enabled=false

# ── Transfer debug logging ─────────────────────────────────────────────────
# Shows [DIRECT TRANSFER] / [TRANSFER DISPATCH] log lines in the console.
logging.level.com.supplychain.service.TransferRequestService=DEBUG
logging.level.com.supplychain.service.MedicineService=INFO
